services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: finagent_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - finagent_network

  fastapi-app:
    build: .
    container_name: finagent_api
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
      - PROJECT_ID=PROJECT_ID_BURAYA
    volumes:
      - .:/app
      - ./gcp-key.json:/app/gcp-key.json:ro
    depends_on:
      - qdrant
    networks:
      - finagent_network

networks:
  finagent_network:
    driver: bridge